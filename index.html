
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>溯世行 — 宿命国风横版跑酷</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏳</text></svg>">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{
  background:#050505;display:flex;justify-content:center;align-items:center;
  height:100vh;overflow:hidden;font-family:'STKaiti','KaiTi','楷体','STSong','SimSun','宋体',serif;
  user-select:none;-webkit-user-select:none;cursor:default;
}
#gc{
  position:relative;width:1280px;height:720px;border:3px solid #2a1a0a;border-radius:6px;overflow:hidden;
  box-shadow:0 0 80px rgba(180,120,40,0.35),0 0 200px rgba(0,0,0,0.9);
}
canvas{display:block;width:100%;height:100%}
#ol{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  pointer-events:none;z-index:20;
}
#ol.active{pointer-events:auto}
#ts{display:flex;flex-direction:column;align-items:center;gap:20px}
#ts .gt{font-size:86px;color:#f5e6c8;letter-spacing:24px;
  text-shadow:0 0 60px rgba(200,160,80,0.95),0 0 120px rgba(180,120,40,0.4),0 6px 12px rgba(0,0,0,0.8);
  font-family:'STKaiti','楷体',serif;animation:gtGlow 3s ease-in-out infinite}
@keyframes gtGlow{0%,100%{text-shadow:0 0 60px rgba(200,160,80,.95),0 0 120px rgba(180,120,40,.4),0 6px 12px rgba(0,0,0,.8)}50%{text-shadow:0 0 80px rgba(220,180,100,.95),0 0 160px rgba(200,140,60,.5),0 8px 16px rgba(0,0,0,.9)}}
#ts .st{font-size:18px;color:#b8a070;letter-spacing:10px;
  text-shadow:0 0 12px rgba(180,120,40,0.5)}
#ts .info{color:#909090;font-size:13px;text-align:center;line-height:2;margin-top:8px}
#ts .kw{color:#d0a040}
.btn{padding:14px 60px;font-size:20px;
  background:linear-gradient(135deg,#5a2d0c,#8b4513);color:#f5e6c8;
  border:2px solid #c8a860;border-radius:4px;cursor:pointer;
  font-family:inherit;letter-spacing:6px;transition:all .35s;
  text-shadow:0 1px 3px rgba(0,0,0,.5);position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,215,0,.25) 0%,transparent 60%);opacity:0;transition:opacity .35s}
.btn:hover{background:linear-gradient(135deg,#8b4513,#c87137);
  box-shadow:0 0 50px rgba(200,160,80,.8),0 0 100px rgba(200,160,80,.3);transform:scale(1.06)}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.98);transition:transform .1s}
#gos{display:none;flex-direction:column;align-items:center;gap:14px}
#gos .got{font-size:52px;color:#c04040;letter-spacing:10px;
  text-shadow:0 0 30px rgba(200,60,60,.7)}
#gos .gosc{font-size:28px;color:#f0d080;letter-spacing:4px}
#gos .gost{font-size:15px;color:#b0a090;letter-spacing:3px;
  max-width:520px;text-align:center;line-height:1.7;font-style:italic}
#gos .gosd{font-size:13px;color:#807060;margin-top:4px;text-align:center;line-height:1.5}
/* HUD */
#hud{
  position:absolute;top:14px;left:20px;right:20px;display:none;
  justify-content:space-between;align-items:center;z-index:10;pointer-events:none;
}
#hud>div{color:#e8d5b0;font-size:15px;text-shadow:0 0 10px rgba(0,0,0,.9),0 0 20px rgba(200,160,80,.3);letter-spacing:2px;transition:color .5s}
#hud .dn{font-size:22px;color:#f0d080;letter-spacing:5px;text-shadow:0 0 15px rgba(200,160,80,.4)}
#hud .sk{color:#c0a0ff;font-size:13px;text-shadow:0 0 8px rgba(180,150,255,.3)}
/* 技能栏 */
#sb{
  position:absolute;bottom:72px;left:50%;transform:translateX(-50%);
  display:none;gap:8px;z-index:10;pointer-events:none;
}
#sb .sc{
  width:42px;height:42px;border:2px solid #5a4a30;border-radius:4px;
  background:rgba(20,15,10,.8);display:flex;align-items:center;justify-content:center;
  color:#8a7a5a;font-size:18px;transition:all .4s;
}
#sb .sc.ready{border-color:#c0a040;color:#f0d080;box-shadow:0 0 12px rgba(200,160,80,.4)}
#sb .sc.used{border-color:#4a2020;color:#602020;background:rgba(30,10,10,.8)}
/* 叙事文本框 */
#nt{
  position:absolute;bottom:130px;left:50%;transform:translateX(-50%);
  max-width:700px;padding:16px 28px;
  background:rgba(10,8,5,.92);border:1px solid #4a3820;
  color:#d0c0a0;font-size:15px;letter-spacing:2px;line-height:1.8;
  text-align:center;z-index:15;pointer-events:none;
  opacity:0;transition:opacity .8s;border-radius:2px;
  text-shadow:0 0 8px rgba(0,0,0,.5);
}
#nt.show{opacity:1}
#nt .ntn{color:#f0d080;font-size:13px;margin-bottom:4px}
/* 技能提示 */
#sh{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  color:#f0d080;font-size:14px;letter-spacing:3px;z-index:10;pointer-events:none;
  opacity:0;transition:opacity .4s;text-shadow:0 0 12px rgba(0,0,0,.9);
}
#sh.show{opacity:1}
/* 过场全屏覆盖 */
#tsc{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.85);display:none;flex-direction:column;
  justify-content:center;align-items:center;z-index:25;
}
#tsc .tscn{font-size:44px;color:#f0d080;letter-spacing:12px;
  text-shadow:0 0 30px rgba(200,160,80,.6)}
#tsc .tscs{font-size:16px;color:#a09080;letter-spacing:6px;margin-top:8px}
#tsc .tsct{font-size:18px;color:#c0b090;max-width:600px;text-align:center;
  line-height:1.8;margin-top:16px;font-style:italic;letter-spacing:2px}
@media(max-width:1300px){#gc{width:100vw;height:56.25vw;max-height:100vh}}
/* 移动端技能按钮 */
#mbs{display:none;position:absolute;bottom:10px;right:10px;z-index:30;gap:6px}
@media(pointer:coarse){#mbs{display:flex}#mbs .mb{width:44px;height:44px;background:rgba(20,15,10,.85);border:2px solid #5a4a30;border-radius:6px;color:#c0a860;font-size:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1.2;-webkit-tap-highlight-color:transparent}.mb:active{border-color:#f0d080;color:#f0d080}}
</style>
</head>
<body>
<div id="gc">
<canvas id="c"></canvas>
<div id="hud">
  <div>🏃 <span id="sd">0</span> 丈</div>
  <div class="dn" id="dd">鸿蒙初开</div>
  <div class="sk">💎 <span id="frd">0</span> | 涟漪:<span id="rd">0</span></div>
</div>
<div id="sb">
  <div class="sc" id="sk1" title="寸光回溯(E) — 重置当前所有障碍">回</div>
  <div class="sc" id="sk2" title="丹心护体(Q) — 英灵挡伤害(最多3次)">护</div>
  <div class="sc" id="sk3" title="山河移步(R) — 清除障碍但后续更多">移</div>
  <div class="sc" id="sk4" title="妄念改写(T) — 减速+短暂无敌">改</div>
  <div class="sc" id="sk5" title="天命解封(Y) — 清屏无敌，下关双倍伤害">解</div>
</div>
<div id="nt"><span class="ntn" id="ntn"></span><br><span id="ntt"></span></div>
<div id="sh"></div>
<div id="tsc">
  <div class="tscn" id="tscn"></div>
  <div class="tscs" id="tscs"></div>
  <div class="tsct" id="tsct"></div>
</div>
<div id="ol" class="active">
  <div id="ts">
    <div class="gt">溯 世 行</div>
    <div class="st">—— 宿命国风横版跑酷 ——</div>
    <div class="info">
      <span class="kw">空格/点击</span> 跳跃(二段) · <span class="kw">Shift/S</span> 滑铲<br>
      <span class="kw">E</span> 寸光回溯 · <span class="kw">Q</span> 丹心护体 · <span class="kw">R</span> 山河移步<br>
      <span class="kw">T</span> 妄念改写 · <span class="kw">Y</span> 天命解封<br>
      每使用一次改命技能，都将付出不可逆的代价
    </div>
    <button class="btn" id="bs" onclick="start()">踏 入 时 空</button>
  </div>
  <div id="gos">
    <div class="got">长河无尽</div>
    <div class="gosc" id="fs"></div>
    <div class="gost" id="et"></div>
    <div class="gosd" id="esd"></div>
    <button class="btn" onclick="restart()">再 入 轮 回</button>
  </div>
  <!-- 移动端技能按钮 -->
  <div id="mbs">
    <button class="mb" id="mb1" ontouchstart="useRewind()">E<br>回溯</button>
    <button class="mb" id="mb2" ontouchstart="useDanxin()">Q<br>护体</button>
    <button class="mb" id="mb3" ontouchstart="useMove()">R<br>移步</button>
    <button class="mb" id="mb4" ontouchstart="useRewrite()">T<br>改写</button>
    <button class="mb" id="mb5" ontouchstart="useUnseal()">Y<br>解封</button>
  </div>
</div>
</div>
<script>
/* ===================================================================
 * 溯世行 v2 — 完整概念版
 * 五大技能 | 18关叙事 | 平行时空残影 | 过场演出 | 天气影响玩法
 * 纯原生 HTML5 Canvas + JS，零外部依赖
 * =================================================================== */
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};
    this.beginPath();
    this.moveTo(x+r.tl,y);
    this.lineTo(x+w-r.tr,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r.tr);
    this.lineTo(x+w,y+h-r.br);
    this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
    this.lineTo(x+r.bl,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r.bl);
    this.lineTo(x,y+r.tl);
    this.quadraticCurveTo(x,y,x+r.tl,y);
    this.closePath();
  };
}

ca.width=W;ca.height=H;

// ========== 改命追踪 ==========
let rw=0,        // 寸光回溯次数
    dh=0,        // 丹心护体次数  
    sh=0,        // 山河移步次数
    wn=0,        // 妄念改写次数
    tm=0;        // 天命解封次数
let totalAlters=0; // 总改命次数
let ripple=0;   // 时空涟漪强度
let parUnstable=false; // 平行时空不稳定
let fateLock=0; // 天命解封惩罚标记

// ========== 关卡定义 (18关完整版) ==========
const LEVELS=[
  {name:'茹毛泣土',era:'原始社会',sub:'约200万年前—公元前2070年',dyn:0,

     {at:2200,t:'火的发现，照亮了人类文明的第一个黎明。',n:'最初的火种'}
   ],quote:'天若不生人，万古如长夜。'},
  {name:'禅让残风',era:'上古五帝',sub:'约公元前2600年—公元前2070年',dyn:0,

   narrative:[
     {at:400,t:'大禹路过家门，听到里面孩子的哭声。',n:'治水十三年'},

     {at:1800,t:'他的手上全是老茧，脚上全是水泡。',n:'以身为度'},

  {name:'青铜饕餮',era:'夏商周',sub:'公元前2070年—公元前256年',dyn:1,

     {at:500,t:'青铜鼎在烈火中铸成。饕餮纹饰缓缓流动，仿佛活了过来。',n:'青铜时代'},

  {name:'百家争鸣',era:'春秋战国',sub:'公元前770年—公元前221年',dyn:8,

// ========== 工具函数 ==========
function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y}
function mixCol(base,over,ratio){
  if(ratio<=0)return base;if(ratio>=1)return over;
  function hr(c){const cl=c.replace('#','');return[parseInt(cl.substring(0,2),16),parseInt(cl.substring(2,4),16),parseInt(cl.substring(4,6),16)]}
  const b=hr(base),o=hr(over);
  return `rgb(${Math.round(b[0]+(o[0]-b[0])*Math.min(1,ratio))},${Math.round(b[1]+(o[1]-b[1])*Math.min(1,ratio))},${Math.round(b[2]+(o[2]-b[2])*Math.min(1,ratio))})`;
}
function spP(x,y,n,col,s){
  for(let i=0;i<n;i++)pts.push({x,y,vx:(Math.random()-.5)*s*2,vy:-Math.random()*s*3,life:20+Math.random()*20,ml:40,col,sz:1+Math.random()*3});
}
function showHint(t){const e=document.getElementById('sh');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200);}
function showNarr(name,text){

  ntn.textContent=name;ntt.textContent=text;
  nt.classList.add('show');narrShowing=true;narrT=180;
}

// ========== 障碍物 ==========
class Obstacle{
  constructor(x,y,type,dyI){
    this.x=x;this.y=y;this.type=type;this.dyI=dyI;this.passed=false;this.a=1;this.pt=Math.random()*Math.PI*2;
    switch(type){
      case'rock':this.w=40+Math.random()*30;this.h=40+Math.random()*30;break;
      case'spear':this.w=12;this.h=60+Math.random()*40;break;
      case'fire':this.w=36;this.h=50+Math.random()*20;break;
      case'wall':this.w=20;this.h=80+Math.random()*60;break;
      case'gold_plate':this.w=24;this.h=32;break;
      case'memory_shard':this.w=16;this.h=20;break;
    }
  }
  up(s){this.x-=s;this.pt+=0.05}
  off(){return this.x<-80}
  getHitbox(){
    if(this.type==='gold_plate'||this.type==='memory_shard')return{x:this.x-14,y:this.y-18,w:28,h:36};
    return{x:this.x-this.w*.5,y:this.y-this.h,w:this.w,h:this.h};
  }
  isCol(){return this.type==='gold_plate'||this.type==='memory_shard'}
  draw(ctx){
    const dv=DYNASTY_VIS[this.dyI],pulse=Math.sin(this.pt)*.2+.8;ctx.save();ctx.globalAlpha=this.a;
    switch(this.type){
      case'rock':
        const grd=ctx.createRadialGradient(this.x,this.y,2,this.x,this.y,this.w*.5);
        grd.addColorStop(0,dv.colors.ground);grd.addColorStop(.6,dv.colors.ink);grd.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=grd;ctx.beginPath();
        for(let i=0;i<7;i++){const a=(i/7)*Math.PI*2,r=this.w*.5*(.7+Math.sin(i*3.7)*.3);i===0?ctx.moveTo(this.x+Math.cos(a)*r,this.y-Math.abs(Math.sin(a))*this.h*.5):ctx.lineTo(this.x+Math.cos(a)*r,this.y-Math.abs(Math.sin(a))*this.h*.5)}
        ctx.closePath();ctx.fill();ctx.strokeStyle=dv.colors.ink;ctx.lineWidth=2;ctx.stroke();break;
      case'spear':
        ctx.fillStyle=this.dyI<=1?'#6a8a3a':'#4a4a4a';ctx.fillRect(this.x-3,this.y-this.h,6,this.h);
        ctx.beginPath();ctx.moveTo(this.x,this.y-this.h-15);ctx.lineTo(this.x-8,this.y-this.h+5);ctx.lineTo(this.x+8,this.y-this.h+5);
        ctx.closePath();ctx.fillStyle='#c8c8c0';ctx.fill();ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.stroke();break;
      case'fire':
        for(let i=3;i>=0;i--){const sc=1-i*.15,al=.3+i*.2;
          ctx.fillStyle=i===0?`rgba(255,200,30,${al})`:i===1?`rgba(255,120,10,${al})`:i===2?`rgba(255,60,5,${al})`:`rgba(200,20,0,${al})`;
          ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.quadraticCurveTo(this.x-16*sc*pulse,this.y-40*sc,this.x,this.y-55*sc);
          ctx.quadraticCurveTo(this.x+16*sc*pulse,this.y-40*sc,this.x,this.y);ctx.fill();}break;
      case'wall':
        ctx.fillStyle=dv.colors.ground;ctx.fillRect(this.x-this.w*.5,this.y-this.h,this.w,this.h);
        ctx.strokeStyle=dv.colors.accent;ctx.lineWidth=3;ctx.strokeRect(this.x-this.w*.5,this.y-this.h,this.w,this.h);
        ctx.beginPath();ctx.arc(this.x,this.y-this.h*.5,8,0,Math.PI*2);ctx.stroke();break;
      case'gold_plate':
        const gl=ctx.createRadialGradient(this.x,this.y,2,this.x,this.y,20);
        gl.addColorStop(0,'rgba(255,215,0,.8)');gl.addColorStop(.5,'rgba(255,200,0,.4)');gl.addColorStop(1,'rgba(255,180,0,0)');
        ctx.fillStyle=gl;ctx.beginPath();ctx.arc(this.x,this.y,20*pulse,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffd700';ctx.beginPath();ctx.roundRect(this.x-12,this.y-16,24,32,3);ctx.fill();
        ctx.strokeStyle='#b8860b';ctx.lineWidth=2;ctx.stroke();
        ctx.fillStyle='#8b4513';ctx.font='bold 14px "STKaiti","楷体"';ctx.textAlign='center';ctx.fillText('敕',this.x,this.y+6);break;
      case'memory_shard':
        const sg=ctx.createRadialGradient(this.x,this.y,1,this.x,this.y,14);
        sg.addColorStop(0,'rgba(200,220,255,.9)');sg.addColorStop(.5,'rgba(150,180,255,.5)');sg.addColorStop(1,'rgba(100,140,255,0)');
        ctx.fillStyle=sg;ctx.beginPath();ctx.arc(this.x,this.y,14*pulse,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#c8e0ff';ctx.beginPath();ctx.moveTo(this.x,this.y-10);ctx.lineTo(this.x+8,this.y);ctx.lineTo(this.x,this.y+8);ctx.lineTo(this.x-7,this.y+2);ctx.closePath();ctx.fill();
        ctx.strokeStyle='#8899cc';ctx.lineWidth=1;ctx.stroke();break;
    }ctx.restore();
  }
}

// ========== 生成障碍物 ==========
function spawnObs(){
  const lv=LEVELS[curLevel],pool=lv.obi,type=pool[Math.floor(Math.random()*pool.length)];
  const isCol=(type==='gold_plate'||type==='memory_shard');
  // 偶尔生成记忆碎片
  if(!isCol&&Math.random()<.12&&type!=='gold_plate'){
    const shard=new Obstacle(W+50,GY-70-Math.random()*80,'memory_shard',lv.dyn);obs.push(shard);
  }
  const y=isCol?GY-60-Math.random()*80:GY;
  const o=new Obstacle(W+50,y,type,lv.dyn);obs.push(o);
  // 山河移步代价：额外障碍
  if(pl.extraObs>0&&Math.random()<.4){
    pl.extraObs--;
    const t2=pool.filter(t=>t!=='gold_plate'&&t!=='memory_shard')[0]||'rock';
    obs.push(new Obstacle(W+110,GY,t2,lv.dyn));
  }
  // 组合障碍
  if(!isCol&&Math.random()<.3){
    const t2=pool.filter(t=>t!=='gold_plate'&&t!=='memory_shard')[Math.floor(Math.random()*Math.max(1,pool.filter(t=>t!=='gold_plate'&&t!=='memory_shard').length))];
    if(t2)obs.push(new Obstacle(W+50+60+Math.random()*40,GY,t2,lv.dyn));
  }
}

// ========== 五大技能 ==========
function useRewind(){
  if(pl.skCd.rewind>0)return;
  rw++;totalAlters++;pl.skCd.rewind=300;
  pl.inv=true;pl.invT=70;
  for(const o of obs)spP(o.x,o.y,8,'#d0c0ff',3);
  obs=[];obsT=0;
  spP(PX,pl.y,25,'#ffffff',8);
  ripple=Math.min(1,totalAlters*.08);
  // 生成平行时空残影
  spawnGhost();
  showHint('寸光回溯 — 你失去了一段记忆');
  updateSkillBar();
}

function useDanxin(){
  if(pl.skCd.danxin>0||dh>=3)return; // 最多3次，用完英灵永远消失
  dh++;totalAlters++;pl.skCd.danxin=600;
  pl.spiritActive=true;pl.spiritT=280; // ~4.5秒
  // 生成英灵
  pl.spirits=[];
  for(let i=0;i<5;i++){
    pl.spirits.push({x:PX+(i-2)*25,y:pl.y-30-i*5,alpha:.8,phase:i*1.2});
  }
  ripple=Math.min(1,totalAlters*.08);
  spawnGhost();
  showHint('丹心护体 — 历代英灵为你而战，但他们将永远消失');
  updateSkillBar();
}

function useMove(){
  if(pl.skCd.move>0)return;
  sh++;totalAlters++;pl.skCd.move=450;
  // 清除当前所有障碍物
  for(const o of obs)spP(o.x,o.y,6,'#80ff80',3);
  obs=[];obsT=0;
  // 代价：未来出现更多障碍
  pl.extraObs+=3+sh;
  ripple=Math.min(1,totalAlters*.08);
  spawnGhost();
  showHint('山河移步 — 此路已开，但别处将有更多险阻');
  updateSkillBar();
}

function useRewrite(){
  if(pl.skCd.rewrite>0)return;
  wn++;totalAlters++;pl.skCd.rewrite=500;
  // 效果：减慢速度并短暂无敌
  sp-=2;pl.inv=true;pl.invT=100;
  // 代价：承受痛苦（屏幕抖动+粒子）
  pl.painTimer=120;
  spP(PX,pl.y,20,'#ff4444',6);
  ripple=Math.min(1,totalAlters*.08);
  spawnGhost();
  showHint('妄念改写 — 你改写了一个人的命运，代他承受痛苦');
  updateSkillBar();
}

function useUnseal(){
  if(pl.skCd.unseal>0)return;
  tm++;totalAlters++;pl.skCd.unseal=800;
  // 效果：清除所有障碍+获得大量无敌时间
  for(const o of obs)spP(o.x,o.y,10,'#ff8800',5);
  obs=[];obsT=0;
  pl.inv=true;pl.invT=150;
  // 代价：下一关所有障碍伤害翻倍，速度减半
  fateLock=2;
  spP(PX,pl.y,40,'#ffffff',10);
  ripple=Math.min(1,totalAlters*.08);
  spawnGhost();
  showHint('天命解封 — 历史规则暂时失效。但代价将在下一关显现');
  updateSkillBar();
}

function spawnGhost(){
  // 生成平行时空残影：另一个自己（没有改命的自己）
  ghosts.push({
    x:PX+80+Math.random()*400,y:pl.y,
    alpha:.5,life:300,vy:0,jumping:false,
    dir:Math.random()>.5?1:-1,phase:Math.random()*Math.PI*2
  });
  if(ghosts.length>8)ghosts.shift();
}

// ========== 碰撞处理 ==========
function handleCollision(o){
  if(o.isCol()){
    if(o.type==='memory_shard'){colShards++;spP(o.x,o.y,10,'#c8e0ff',4)}
    else if(o.type==='gold_plate'){goldPlates++;pl.bs=Math.min(1,goldPlates/12);spP(o.x,o.y,20,'#ffd700',6)}
    return true; // 移除
  }
  if(pl.inv)return false;
  // 英灵护体
  if(pl.spiritActive&&pl.spirits.length>0){
    pl.spirits.pop();spP(o.x,o.y,12,'#f0d080',5);
    return true; // 英灵挡下
  }
  if(fateLock>0){
    // 天命解封惩罚：双倍伤害
    pl.bs+=.3;
  }else{
    pl.bs=Math.min(1,pl.bs+.15);
  }
  if(pl.bs>=1){triggerGameOver();return false}
  pl.inv=true;pl.invT=40;
  pl.vy=-8;pl.y=Math.min(pl.y,GY-40);
  spP(pl.x,pl.y+30,15,'#cc2200',5);
  return false;
}

// ========== 游戏循环 ==========
function loop(){
  if(gs===ST.TITLE){drawTitleBG();requestAnimationFrame(loop);return}
  if(gs===ST.TRANSITION){updateTransition();requestAnimationFrame(loop);return}

  fc++;const lv=LEVELS[curLevel],dv=DYNASTY_VIS[lv.dyn];

  // 速度计算（含天气+天命惩罚）
  let effSp=BS+dst*.0002;
  if(lv.weather==='rain')effSp*=1.08; // 雨天路滑，实际速度更快但更难控制
  if(lv.weather==='snow')effSp*=.92; // 雪天慢
  if(fateLock>0)effSp*=.7;
  effSp=Math.min(MS,Math.max(BS*.7,effSp));
  sp=effSp;

  dst+=sp*.1;sc=Math.floor(dst);levelDist+=sp*.1;

  // 天命惩罚倒计时（持续整个下一关）
  if(fateLock>0&&levelDist>LEVELS[curLevel].narrative[LEVELS[curLevel].narrative.length-1].at+500){
    fateLock=0;
  }

  // 关卡切换检查（等所有叙事事件触发完毕后再切换）
  if(curLevel<LEVELS.length-1){
    const lvNarr=lv.narrative;
    const lastAt=lvNarr.length>0?lvNarr[lvNarr.length-1].at:3000;
    if(levelDist>lastAt+500&&narrIdx>=lvNarr.length){
      startTransition();return;
    }
  }

  // 第18关（最后一关）通关检测
  if(curLevel===LEVELS.length-1&&narrIdx>=lv.narrative.length){
    const lastAt=lv.narrative.length>0?lv.narrative[lv.narrative.length-1].at:3000;
    if(levelDist>lastAt+800){
      triggerVictory();return;
    }
  }

  // 叙事事件
  if(narrIdx<lv.narrative.length){
    const ev=lv.narrative[narrIdx];
    if(levelDist>ev.at&&!narrShowing){
      showNarr(ev.n,ev.t);narrIdx++;
    }
  }
  if(narrShowing){narrT--;if(narrT<=0){document.getElementById('nt').classList.remove('show');narrShowing=false}}

  // 更新玩家
  updatePlayer();

  // 更新技能冷却
  for(const k in pl.skCd)if(pl.skCd[k]>0)pl.skCd[k]--;

  // 更新英灵
  if(pl.spiritActive){pl.spiritT--;if(pl.spiritT<=0){pl.spiritActive=false;pl.spirits=[]}}

  // 更新平行时空残影
  for(let i=ghosts.length-1;i>=0;i--){
    const gh=ghosts[i];
    gh.x-=sp*.4*gh.dir;gh.y+=gh.vy;gh.vy+=.2;
    if(gh.y>=GY){gh.y=GY;gh.vy=-3-Math.random()*5}
    gh.life--;if(gh.life<=0)ghosts.splice(i,1);
  }

  // 更新障碍物
  for(const o of obs)o.up(sp);
  obsT++;
  if(obsT>obsIv){obsT=0;spawnObs()}

  // 碰撞检测
  const pb=pl.sliding?
    {x:pl.x-pl.w*.4,y:pl.y-5,w:pl.w*.8,h:28}:
    {x:pl.x-pl.w*.4,y:pl.y-15,w:pl.w*.8,h:pl.h*.7};
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    if(o.off()){obs.splice(i,1);continue}
    if(rc(pb,o.getHitbox())){
      if(handleCollision(o)){obs.splice(i,1)}
      else if(!pl.alive){return}
    }
    if(!o.passed&&o.x+o.w<pl.x){o.passed=true;if(!o.isCol())sc+=10}
  }

  // 更新粒子/天气/背景
  updateParticles();updateWeather(lv.weather);updateBGElements(lv.dyn);
  handleInput();
  render();
  updateUI();

  requestAnimationFrame(loop);
}

function updatePlayer(){
  // 重力
  if(pl.y<GY){pl.vy+=G;pl.y+=pl.vy;if(pl.y>=GY){pl.y=GY;pl.vy=0;pl.jumping=false;pl.canDJ=true}}
  // 滑铲
  if(pl.sliding){pl.slideT--;if(pl.slideT<=0){pl.sliding=false;pl.h=60;pl.y=Math.min(GY,pl.y)}}
  // 无敌
  if(pl.inv){pl.invT--;if(pl.invT<=0)pl.inv=false}
  // 痛苦惩罚
  if(pl.painTimer>0)pl.painTimer--;
  // 残影
  pl.rt++;if(pl.rt>6){pl.rt=0;pl.rf=(pl.rf+1)%4}
  if(fc%3===0&&pl.jumping){pl.trails.push({x:pl.x,y:pl.y,a:.4,w:pl.w,h:pl.h,sl:pl.sliding,bs:pl.bs})
    if(pl.trails.length>10)pl.trails.shift()}
  for(let i=pl.trails.length-1;i>=0;i--){pl.trails[i].a-=.04;if(pl.trails[i].a<=0)pl.trails.splice(i,1)}
}

function handleInput(){
  if((keys[' ']||keys['ArrowUp']||keys['KeyW'])&&!keys._ju){
    keys._ju=true;doJump();
  }else if(!keys[' ']&&!keys['ArrowUp']&&!keys['KeyW'])keys._ju=false;

  if((keys['Shift']||keys['ArrowDown']||keys['KeyS'])&&!keys._sl){
    keys._sl=true;doSlide();
  }else if(!keys['Shift']&&!keys['ArrowDown']&&!keys['KeyS'])keys._sl=false;

  if((keys['e']||keys['KeyE'])&&!keys._rw){keys._rw=true;useRewind()}else if(!keys['e']&&!keys['KeyE'])keys._rw=false;
  if((keys['q']||keys['KeyQ'])&&!keys._dx){keys._dx=true;useDanxin()}else if(!keys['q']&&!keys['KeyQ'])keys._dx=false;
  if((keys['r']||keys['KeyR'])&&!keys._mv){keys._mv=true;useMove()}else if(!keys['r']&&!keys['KeyR'])keys._mv=false;
  if((keys['t']||keys['KeyT'])&&!keys._rwt){keys._rwt=true;useRewrite()}else if(!keys['t']&&!keys['KeyT'])keys._rwt=false;
  if((keys['y']||keys['KeyY'])&&!keys._us){keys._us=true;useUnseal()}else if(!keys['y']&&!keys['KeyY'])keys._us=false;
}

function doJump(){if(pl.sliding)return;if(!pl.jumping){pl.vy=-14;pl.jumping=true;pl.canDJ=true}else if(pl.canDJ){pl.vy=-11;pl.canDJ=false;spP(pl.x,pl.y+pl.h,8,'#f0d080',3)}}
function doSlide(){if(pl.jumping||pl.sliding)return;pl.sliding=true;pl.slideT=25;pl.h=28;pl.y=GY+32}

// ========== 渲染 ==========
function render(){
  cx.clearRect(0,0,W,H);
  const lv=LEVELS[curLevel],dv=DYNASTY_VIS[lv.dyn];

  // 天空
  const sg=cx.createLinearGradient(0,0,0,GY);
  sg.addColorStop(0,dv.colors.sky);sg.addColorStop(1,dv.colors.fog);
  cx.fillStyle=sg;cx.fillRect(0,0,W,GY);

  // 远景山
  drawMountains(dv);
  // 水墨云雾
  drawClouds(dv);
  // 背景元素
  drawBGElements(dv);

  // 天气
  drawWeather(lv.weather);

  // 地面
  cx.fillStyle=dv.colors.ground;cx.fillRect(0,GY,W,H-GY);
  cx.strokeStyle=dv.colors.ink;cx.globalAlpha=.3;cx.lineWidth=1;
  cx.beginPath();cx.moveTo(0,GY);
  for(let x=0;x<W;x+=40){cx.lineTo(x,GY+3+Math.sin(x*.02+fc*.01)*5)}
  cx.stroke();
  cx.beginPath();cx.moveTo(0,GY+18);
  for(let x=0;x<W;x+=50){cx.lineTo(x,GY+20+Math.cos(x*.015+fc*.008)*3)}
  cx.stroke();cx.globalAlpha=1;

  // 天气影响：雨天地面反光、雪天地面积雪
  if(lv.weather==='rain'){
    cx.fillStyle='rgba(180,200,220,.06)';cx.fillRect(0,GY,W,H-GY);
  }else if(lv.weather==='snow'){
    cx.fillStyle='rgba(255,255,255,.08)';cx.fillRect(0,GY,W,H-GY);
    // 脚印效果（简化：地面随机白色斑块）
    for(let i=0;i<8;i++){
      const fx=((pl.x+i*30+fc*2)%(W+100))-50;if(fx<0||fx>W)continue;
      cx.fillStyle='rgba(255,255,255,.15)';cx.beginPath();
      cx.ellipse(fx,GY+4,6,2,0,0,Math.PI*2);cx.fill();
    }
  }else if(lv.weather==='sand'){
    cx.fillStyle='rgba(200,180,140,.08)';cx.fillRect(0,GY,W,H-GY);
  }

  // 绘制平行时空残影
  for(const gh of ghosts){
    cx.save();cx.globalAlpha=gh.a*.4;
    drawPlayerBody(gh.x,gh.y,pl.w,pl.h,false,0,dv,fc+gh.phase*20);
    cx.restore();
  }

  // 障碍物
  for(const o of obs)o.draw(cx);
  // 玩家
  drawPlayer(dv);
  // 英灵
  drawSpirits(dv);
  // 粒子
  drawParticles(cx);

  // 时空涟漪
  drawRipple(dv);

  // 痛苦效果（妄念改写代价）
  if(pl.painTimer>0){
    cx.save();cx.globalAlpha=.15;cx.fillStyle='#ff0000';
    cx.fillRect(0,0,W,H);cx.restore();
    // 屏幕抖动通过CSS处理
    ca.style.transform=`translate(${(Math.random()-.5)*4}px,${(Math.random()-.5)*4}px)`;
  }else{ca.style.transform=''}

  // 天命惩罚标记
  if(fateLock>0){
    cx.save();cx.globalAlpha=.1;cx.fillStyle='#ff4400';
    cx.fillRect(0,0,W,H);cx.restore();
  }

  // 十二金牌关金色光晕
  if(lv.special==='SnowField'&&levelDist>2000){
    const ga=Math.min(1,(levelDist-2000)/500)*.2;
    cx.save();cx.globalAlpha=ga;
    const gg=cx.createRadialGradient(W/2,H/2,100,W/2,H/2,600);
    gg.addColorStop(0,'rgba(255,215,0,0)');gg.addColorStop(1,'rgba(255,215,0,.5)');
    cx.fillStyle=gg;cx.fillRect(0,0,W,H);cx.restore();
  }

  // 朝代色调滤镜
  if(dv.hue!==0){
    cx.save();cx.globalCompositeOperation='overlay';cx.globalAlpha=.06;
    cx.fillStyle=dv.hue>0?`rgb(${200+dv.hue},180,160)`:`rgb(160,${180-dv.hue},200)`;
    cx.fillRect(0,0,W,H);cx.restore();
  }
}

function drawPlayer(dv){
  const al=pl.inv?0.5+Math.sin(fc*.5)*.3:1;cx.save();cx.globalAlpha=al;
  // 残影
  for(const t of pl.trails){cx.save();cx.globalAlpha=t.a*.5;drawPlayerBody(t.x,t.y,t.w,t.h,t.sl,t.bs,dv,fc);cx.restore()}
  drawPlayerBody(pl.x,pl.y,pl.w,pl.h,pl.sliding,pl.bs,dv,fc);
  cx.restore();
}

function drawPlayerBody(x,y,w,h,sl,bs,dv,fc){
  const rw=Math.sin(fc*.1)*3;
  if(sl){
    cx.fillStyle=mixCol('#f0e8d8','#cc0000',bs);cx.beginPath();
    cx.ellipse(x,y+10,w*.55,h*.4,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='#f5e0c0';cx.beginPath();cx.arc(x+10,y-4,10,0,Math.PI*2);cx.fill();
    cx.fillStyle='#1a1a1a';cx.beginPath();cx.arc(x+6,y-14,6,0,Math.PI*2);cx.fill();
  }else{
    // 双腿
    cx.fillStyle=mixCol('#d8c8b0','#880000',bs);
    cx.fillRect(x-8,y+h*.5,10,h*.4);cx.fillRect(x+2,y+h*.5,10,h*.4);
    // 身体
    cx.fillStyle=mixCol('#f0e8d8','#cc0000',bs);cx.beginPath();
    cx.moveTo(x-12,y+h*.5);cx.lineTo(x-8,y-10);cx.lineTo(x+10,y-10);cx.lineTo(x+14,y+h*.5+rw);cx.closePath();cx.fill();
    // 腰带
    cx.strokeStyle=mixCol('#8b6914','#660000',bs);cx.lineWidth=2;
    cx.beginPath();cx.moveTo(x-10,y+10);cx.lineTo(x+12,y+10);cx.stroke();
    // 头
    cx.fillStyle='#f5e0c0';cx.beginPath();cx.arc(x+1,y-16,11,0,Math.PI*2);cx.fill();
    cx.fillStyle='#1a1a1a';cx.beginPath();cx.arc(x+1,y-28,7,0,Math.PI*2);cx.fill();
    cx.strokeStyle='#d0c0a0';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(x+1,y-32);cx.quadraticCurveTo(x+8+rw,y-38,x+14+rw*2,y-42);cx.stroke();
    // 衣摆褶皱
    cx.strokeStyle=dv.colors.ink;cx.globalAlpha*=.3;cx.lineWidth=1;
    cx.beginPath();cx.moveTo(x-8,y+5);cx.quadraticCurveTo(x,y+15+rw,x+8,y+5);cx.stroke();
  }
}

function drawSpirits(dv){
  if(!pl.spiritActive||pl.spirits.length===0)return;
  for(const sp of pl.spirits){
    cx.save();cx.globalAlpha=sp.alpha*.6;
    cx.fillStyle='#f0e8d0';cx.beginPath();cx.arc(sp.x,sp.y-16,8,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(240,220,180,.4)';cx.beginPath();cx.arc(sp.x,sp.y-16,14,0,Math.PI*2);cx.fill();
    cx.restore();
  }
}

function drawMountains(dv){
  cx.save();cx.globalAlpha=.2;
  for(let l=2;l>=0;l--){
    const al=.08+l*.07,sc=1+l*.3,spd=(1+l*.3)*.02;
    cx.fillStyle=dv.colors.ink;cx.globalAlpha=al;cx.beginPath();cx.moveTo(0,GY-40*sc);
    for(let x=0;x<=W;x+=50){
      const ph=(x+fc*spd)*.005,y=GY-40*sc-Math.sin(ph)*60*sc-Math.sin(ph*2.3)*30*sc-Math.sin(ph*.7)*20*sc;
      cx.lineTo(x,Math.max(GY-120*sc,y));
    }cx.lineTo(W,GY);cx.lineTo(0,GY);cx.closePath();cx.fill();
  }cx.restore();
}

function drawClouds(dv){
  cx.save();cx.globalAlpha=.1;
  const cps=[{x:200,y:120,s:1.2},{x:600,y:80,s:.9},{x:900,y:150,s:1.4},{x:1100,y:100,s:.7}];
  for(const cp of cps){
    const cxPos=(cp.x+fc*.15*cp.s)%(W+200)-100;
    cx.fillStyle=dv.colors.fog;cx.beginPath();
    cx.arc(cxPos,cp.y,60*cp.s,0,Math.PI*2);
    cx.arc(cxPos+50*cp.s,cp.y-10,45*cp.s,0,Math.PI*2);
    cx.arc(cxPos-40*cp.s,cp.y+5,35*cp.s,0,Math.PI*2);cx.fill();
  }cx.restore();
}

function drawBGElements(dv){
  for(const e of bges){
    cx.save();cx.globalAlpha=e.a;
    switch(e.t){
      case'rock':cx.fillStyle=dv.colors.ink;cx.beginPath();cx.moveTo(e.x-30*e.sz,e.y+20*e.sz);cx.lineTo(e.x,e.y-30*e.sz);cx.lineTo(e.x+25*e.sz,e.y+15*e.sz);cx.closePath();cx.fill();break;
      case'bronze':cx.strokeStyle=dv.colors.accent;cx.lineWidth=1;cx.beginPath();cx.arc(e.x,e.y,25*e.sz,0,Math.PI*2);cx.stroke();cx.beginPath();cx.arc(e.x,e.y,15*e.sz,0,Math.PI*2);cx.stroke();break;
      case'bamboo':cx.strokeStyle=dv.colors.accent;cx.lineWidth=1;for(let j=0;j<5;j++){cx.beginPath();cx.moveTo(e.x,e.y-30*e.sz+j*12*e.sz);cx.lineTo(e.x+60*e.sz,e.y-30*e.sz+j*12*e.sz);cx.stroke();}break;
      case'palace':cx.strokeStyle=dv.colors.accent;cx.lineWidth=2;cx.beginPath();cx.moveTo(e.x,e.y-40*e.sz);cx.lineTo(e.x+30*e.sz,e.y-60*e.sz);cx.lineTo(e.x+60*e.sz,e.y-40*e.sz);cx.lineTo(e.x+60*e.sz,e.y);cx.lineTo(e.x,e.y);cx.closePath();cx.stroke();break;
      case'ink':cx.fillStyle=dv.colors.ink;cx.globalAlpha=e.a*.5;cx.beginPath();cx.arc(e.x,e.y,40*e.sz,0,Math.PI);cx.fill();cx.beginPath();cx.arc(e.x+35*e.sz,e.y-10,25*e.sz,0,Math.PI);cx.fill();break;
      case'snowfield':cx.fillStyle='#e8e0d8';cx.globalAlpha=e.a;cx.beginPath();cx.moveTo(e.x-40*e.sz,e.y);cx.quadraticCurveTo(e.x,e.y-35*e.sz,e.x+40*e.sz,e.y);cx.fill();break;
      case'ruins':cx.fillStyle=dv.colors.ground;cx.fillRect(e.x,e.y-20*e.sz,15*e.sz,20*e.sz);cx.fillRect(e.x+30*e.sz,e.y-12*e.sz,10*e.sz,12*e.sz);cx.strokeStyle=dv.colors.ink;cx.lineWidth=1;cx.strokeRect(e.x,e.y-20*e.sz,15*e.sz,20*e.sz);break;
    }cx.restore();
  }
}

function drawRipple(dv){
  if(ripple<=0)return;
  // 屏幕撕裂
  if(ripple>.3){
    const tc=Math.floor(ripple*8);
    for(let i=0;i<tc;i++){const ty=Math.random()*H;cx.save();cx.globalAlpha=.15+ripple*.3;cx.fillStyle='#fff';cx.fillRect(0,ty,W,1+Math.random()*3);cx.restore()}
  }
  // 边缘闪烁
  if(ripple>.5){cx.save();cx.globalAlpha=Math.sin(fc*.1)*ripple*.3;cx.fillStyle='#f00';cx.fillRect(0,0,5,H);cx.fillRect(W-5,0,5,H);cx.restore()}
  // 重影
  if(ripple>.7){
    cx.save();cx.globalAlpha=ripple*.08;
    const og=cx.getImageData(0,0,W,H);cx.putImageData(og,-3,0);cx.putImageData(og,3,0);
    cx.restore();
  }
  // 平行时空不稳定
  if(ripple>.85){
    cx.save();cx.globalAlpha=.05;
    for(let i=0;i<3;i++){cx.fillStyle=`hsl(${(fc+i*60)%360},50%,50%)`;cx.fillRect(Math.random()*W,Math.random()*H,Math.random()*100,2)}
    cx.restore();
  }
}

// ========== 天气粒子 ==========
let wptsA=[];
function updateWeather(wt){
  while(wptsA.length<80){
    wptsA.push({x:Math.random()*W,y:Math.random()*H*.7,
      vy:wt==='snow'?1+Math.random()*2:wt==='rain'?6+Math.random()*8:wt==='sand'?1+Math.random()*3:0,
      vx:wt==='sand'?sp*.3+Math.random()*2:0,
      sz:wt==='snow'?2+Math.random()*4:wt==='rain'?1+Math.random()*1.5:wt==='sand'?3+Math.random()*5:0,
      a:.3+Math.random()*.4,life:200+Math.random()*400});
  }
  for(let i=wptsA.length-1;i>=0;i--){
    const w=wptsA[i];w.y+=w.vy;w.x-=w.vx;w.life--;
    if(w.life<=0||w.y>H||w.x<-20)wptsA.splice(i,1);
  }
}
function drawWeather(wt){
  for(const w of wptsA){
    cx.fillStyle=wt==='snow'?`rgba(255,255,255,${w.a})`:wt==='rain'?`rgba(180,200,220,${w.a})`:`rgba(200,180,140,${w.a})`;
    cx.beginPath();
    if(wt==='rain')cx.fillRect(w.x,w.y,1,w.sz*4);else cx.arc(w.x,w.y,w.sz,0,Math.PI*2);cx.fill();
  }
}
function updateBGElements(di){
  const dv=DYNASTY_VIS[di];
  while(bges.length<15){bges.push({x:W+Math.random()*400,y:50+Math.random()*350,t:dv.bg,sz:.5+Math.random()*1.5,a:.15+Math.random()*.3,sp:sp*(.1+Math.random()*.2)})}
  for(let i=bges.length-1;i>=0;i--){bges[i].x-=bges[i].sp;if(bges[i].x<-100)bges.splice(i,1)}
}

function updateParticles(){
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;if(p.life<=0)pts.splice(i,1)}
}
function drawParticles(ctx){
  for(const p of pts){ctx.globalAlpha=p.life/p.ml;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;
}

// ========== 过场动画 ==========
function startTransition(){
  gs=ST.TRANSITION;transPhase=0;transTimer=0;
  document.getElementById('tsc').style.display='flex';
}
function updateTransition(){
  transTimer++;
  const tsc=document.getElementById('tsc'),tscn=document.getElementById('tscn'),tscs=document.getElementById('tscs'),tsct=document.getElementById('tsct');
  if(transPhase===0){
    // 淡入
    tsc.style.opacity=Math.min(1,transTimer/40);
    if(transTimer<30){
      const lv=LEVELS[curLevel];
      tscn.textContent=lv.name;tscs.textContent=lv.era;tsct.textContent=lv.quote||'';
    }
    if(transTimer>60){transPhase=1;transTimer=0;}
  }else if(transPhase===1){
    // 显示下一关
    if(transTimer<20){
      const nextLv=LEVELS[curLevel+1];
      tscn.textContent=nextLv.name;tscs.textContent=nextLv.era;tsct.textContent=nextLv.quote||'';
    }
    if(transTimer>80){transPhase=2;transTimer=0;}
  }else if(transPhase===2){
    // 淡出
    tsc.style.opacity=Math.max(0,1-transTimer/30);
    if(transTimer>30){
      // 切换关卡
      curLevel++;levelDist=0;narrIdx=0;obs=[];obsT=0;colShards=0;goldPlates=0;
      bges=[];ghosts=[];wptsA=[];
      obsIv=Math.max(40,85-curLevel*3);
      if(curLevel===5)obsIv=60; // 12金牌关障碍更密集
      tsc.style.display='none';tsc.style.opacity=0;
      gs=ST.PLAYING;
      transPhase=0;transTimer=0;
    }
  }
}

// ========== UI更新 ==========
function updateUI(){
  document.getElementById('sd').textContent=Math.floor(dst);
  document.getElementById('dd').textContent=LEVELS[curLevel].name;
  document.getElementById('frd').textContent=colShards;
  document.getElementById('rd').textContent=Math.floor(ripple*100);
  updateSkillBar();
}

function updateSkillBar(){
  const ids=['sk1','sk2','sk3','sk4','sk5'];
  const cds=[pl.skCd.rewind,pl.skCd.danxin,pl.skCd.move,pl.skCd.rewrite,pl.skCd.unseal];
  const spent=[rw>=100,dh>=3,false,wn>=50,false]; // 某些技能有使用上限
  for(let i=0;i<5;i++){
    const el=document.getElementById(ids[i]);
    el.classList.remove('ready','used');
    if(spent[i])el.classList.add('used');
    else if(cds[i]===0)el.classList.add('ready');
  }
}

// ========== 标题背景 ==========
function drawTitleBG(){
  cx.fillStyle='#0a0808';cx.fillRect(0,0,W,H);
  const gg=cx.createLinearGradient(0,0,0,H);
  gg.addColorStop(0,'#0a0808');gg.addColorStop(.5,'#1a1210');gg.addColorStop(1,'#2a1a10');
  cx.fillStyle=gg;cx.fillRect(0,0,W,H);
  // 山
  cx.fillStyle='#1a1a1a';cx.beginPath();cx.moveTo(0,H);
  for(let x=0;x<=W;x+=60){cx.lineTo(x,H*.55+Math.sin(x*.004)*120+Math.sin(x*.011)*60)}cx.lineTo(W,H);cx.closePath();cx.fill();
  cx.fillStyle='#222020';cx.globalAlpha=.7;cx.beginPath();cx.moveTo(0,H);
  for(let x=0;x<=W;x+=40){cx.lineTo(x,H*.7+Math.sin(x*.006+1)*80+Math.cos(x*.013)*40)}cx.lineTo(W,H);cx.closePath();cx.fill();cx.globalAlpha=1;
  // 墨点
  for(let i=0;i<18;i++){
    const mx=(Math.sin(fc*.003+i*2.7)*300+W/2+i*80)%W,my=200+Math.cos(fc*.002+i*1.8)*150;
    cx.fillStyle='#2a2220';cx.globalAlpha=.3+Math.sin(fc*.01+i)*.15;cx.beginPath();cx.arc(mx,my,3+Math.abs(Math.sin(i))*6,0,Math.PI*2);cx.fill();
  }cx.globalAlpha=1;
  cx.fillStyle='#1a1208';cx.fillRect(0,GY,W,H-GY);
  cx.strokeStyle='#3a2a18';cx.lineWidth=1;cx.beginPath();cx.moveTo(0,GY);cx.lineTo(W,GY);cx.stroke();
}

// ========== 游戏控制 ==========
function start(){
  pl={x:PX,y:GY,vy:0,w:36,h:60,jumping:false,sliding:false,canDJ:true,slideT:0,inv:false,invT:0,trails:[],rf:0,rt:0,bs:0,alive:true,
    skCd:{rewind:0,danxin:0,move:0,rewrite:0,unseal:0},
    spiritActive:false,spiritT:0,spirits:[],extraObs:0,painTimer:0};
  obs=[];pts=[];wptsA=[];bges=[];ghosts=[];
  sp=BS;dst=0;sc=0;fc=0;curLevel=0;levelDist=0;narrIdx=0;narrShowing=false;narrT=0;
  obsT=0;obsIv=85;colShards=0;goldPlates=0;
  rw=0;dh=0;sh=0;wn=0;tm=0;totalAlters=0;ripple=0;fateLock=0;
  transPhase=0;transTimer=0;
  gs=ST.PLAYING;
  document.getElementById('ts').style.display='none';
  document.getElementById('gos').style.display='none';
  document.getElementById('ol').classList.remove('active');
  document.getElementById('hud').style.display='flex';
  document.getElementById('sb').style.display='flex';
  updateSkillBar();
}

function triggerGameOver(){
  gs=ST.GAMEOVER;pl.alive=false;
  let et,es,esd='';
  if(totalAlters===0){et='顺命者';es='历史自有它的轨迹，我只是一个过客。';esd='全程未使用任何改命技能'}
  else if(totalAlters>=10){et='逆命者';es='我试图改变一切，最终却一无所有。';esd=`共改命 ${totalAlters} 次 · 时空彻底崩溃`}
  else if(colShards>=3){et='见证者';es='我见证了历史，也理解了历史。这就够了。';esd=`收集 ${colShards} 枚记忆碎片 · 改命 ${totalAlters} 次`}
  else if(totalAlters>0&&totalAlters<10){et='溯时者';es='山河无恙，国泰民安。这，就是对所有逝去的人，最好的告慰。';esd=`改命 ${totalAlters} 次 · 奔行 ${Math.floor(dst)} 丈`}
  else{et='历史的温度';es='他们没有消失。他们活在了我们的心里。活在了这片土地上。';esd=`收集 ${colShards} 枚记忆碎片`}
  document.getElementById('fs').textContent=`奔行了 ${Math.floor(dst)} 丈 · ${et}`;
  document.getElementById('et').textContent=es;
  document.getElementById('esd').textContent=esd;
  document.getElementById('gos').style.display='flex';
  document.getElementById('ol').classList.add('active');
  document.getElementById('hud').style.display='none';
  document.getElementById('sb').style.display='none';
}

function triggerVictory(){
  gs=ST.GAMEOVER;pl.alive=false;
  let et,es,esd='';
  const td=Math.floor(dst/10);
  if(totalAlters===0){
    et='时之守望者';es='十八朝风霜历尽，未曾改过一丝天命。历史向你展示了它的全部面目，而你选择了沉默的见证。';esd=`零改命通关 · 见证十八朝兴衰`
  }else if(totalAlters<=5&&colShards>=5){
    et='命运织者';es='你轻触历史的琴弦，每一次拨动都恰到好处。不多一分，不少一毫。历史记住了你的名字。';esd=`改命 ${totalAlters} 次 · 收集 ${colShards} 枚记忆碎片 · 完美平衡`
  }else if(totalAlters>=15){
    et='逆命狂徒';es='历史在你手下千疮百孔。平行时空摇摇欲坠。但——也许这才是真正的历史？没有人知道。';esd=`改命 ${totalAlters} 次 · 时空濒临崩溃 · 奔行 ${td} 里`
  }else if(goldPlates>=10){
    et='精忠义士';es='十二金牌之后，你理解了岳飞的选择。有些事情，明知不可为而为之——这才是人的尊严。';esd=`收集 ${goldPlates} 枚金牌 · 改命 ${totalAlters} 次`
  }else{
    et='溯世行者';es='从鸿蒙初开到星辰大海，你走完了五千年的沧桑。历史不是一条路，而是一棵树。你的每一次选择，都让这棵树更加茂盛。';esd=`十八朝通关 · 改命 ${totalAlters} 次 · 奔行 ${td} 里`
  }
  document.getElementById('fs').textContent=`溯世之旅 · ${et}`;
  document.getElementById('et').textContent=es;
  document.getElementById('esd').textContent=esd;
  document.getElementById('gos').style.display='flex';
  document.getElementById('ol').classList.add('active');
  document.getElementById('hud').style.display='none';
  document.getElementById('sb').style.display='none';
}

function restart(){start()}

// ========== 初始化 ==========
for(let i=0;i<40;i++){
  wptsA.push({x:Math.random()*W,y:Math.random()*H*.7,vy:1+Math.random()*2,vx:0,sz:2+Math.random()*3,a:.2+Math.random()*.3,life:100+Math.random()*300});
}
requestAnimationFrame(loop);
console.log('溯世行 v2 — 五大技能 | 18关完整版 | 平行时空残影 | 过场演出 | 天气系统');
console.log('E=寸光回溯 Q=丹心护体 R=山河移步 T=妄念改写 Y=天命解封');
